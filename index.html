<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/icon-depanno.png" />
    <link rel="apple-touch-icon" href="/icon-depanno.png" sizes="180x180" />

    <!-- Viewport plein écran (navigateur + PWA installée) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <!-- PWA / iOS -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Depanno" />
    <meta name="application-name" content="Depanno" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Theme color blanche = zone status bar / chrome navigateur blanche -->
    <meta name="theme-color" content="#FFFFFF" />
    <meta name="msapplication-navbutton-color" content="#FFFFFF" />
    <meta name="msapplication-TileColor" content="#FFFFFF" />
    <meta name="msapplication-TileImage" content="/icon-192.png" />

    <!-- SEO -->
    <title>Depanno — Diagnostics IA pour vos réparations</title>
    <meta name="description" content="Prenez une photo de votre problème. Depanno l'analyse en 3 minutes, estime le vrai prix et vous protège des devis abusifs." />
    <meta name="keywords" content="diagnostic réparation, devis artisan, arnaque plombier, guide DIY, IA réparation" />
    <meta name="author" content="Depanno" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Depanno — Ne payez plus trop cher pour vos réparations" />
    <meta property="og:description" content="L'IA qui diagnostique vos problèmes en 3 minutes et vous protège des devis abusifs." />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:url" content="https://depanno.app" />
    <meta property="og:locale" content="fr_FR" />
    <meta property="og:site_name" content="Depanno" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Depanno — Diagnostics IA pour vos réparations" />
    <meta name="twitter:description" content="Prenez une photo. On vous dit quoi faire et combien ça doit coûter." />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- Manifest injecté automatiquement par VitePWA au build -->

    <!-- Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet" />

    <!-- Splash / plein écran avant React -->
    <style>
      html {
        height: 100%;
        width: 100%;
        margin: 0;
        padding: 0;
        background: #FFFFFF;
        -webkit-text-size-adjust: 100%;
      }
      body {
        height: 100%;
        width: 100%;
        margin: 0;
        padding: 0;
        background: #FFFFFF;
        overflow-x: hidden;
        overscroll-behavior: none;
      }
      #root {
        min-height: 100%;
        min-height: 100dvh;
        width: 100%;
        display: flex;
        flex-direction: column;
        background: #FFFFFF;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
